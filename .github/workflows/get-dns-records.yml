name: Get App Runner DNS Records for GoDaddy

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:491766120292:service/contemplation-flow/5b294ce6aeb54f53826ce2d6e8e33a17

jobs:
  get-dns-records:
    name: Output DNS Records
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Output DNS records needed for GoDaddy
        run: |
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --query 'Service.ServiceUrl' --output text)

          aws apprunner describe-custom-domains \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --output json > /tmp/domains.json

          echo "================================================"
          echo " APP RUNNER NATIVE URL (service is live here)"
          echo "================================================"
          echo "  https://$SERVICE_URL"
          echo ""

          echo "================================================"
          echo " GODADDY DNS CHANGES REQUIRED"
          echo "================================================"
          echo ""

          DOMAIN=$(jq -r '.CustomDomains[0].DomainName' /tmp/domains.json)
          STATUS=$(jq -r '.CustomDomains[0].Status' /tmp/domains.json)
          echo "Custom domain configured on App Runner: $DOMAIN"
          echo "Certificate status: $STATUS"
          echo ""

          echo "--- STEP 1: Add SSL Certificate Validation CNAMEs in GoDaddy ---"
          echo "(These prove to AWS you own the domain, required for HTTPS)"
          echo ""
          jq -r '.CustomDomains[0].CertificateValidationRecords[] |
            "  Type:  " + .Type + "\n" +
            "  Name:  " + .Name + "\n" +
            "  Value: " + .Value + "\n"' /tmp/domains.json || echo "  (No cert records - may already be validated)"

          echo ""
          echo "--- STEP 2: Change the www CNAME in GoDaddy ---"
          echo "  Type:  CNAME"
          echo "  Name:  $DOMAIN"
          echo "  Value: $SERVICE_URL"
          echo ""

          echo "--- STEP 3: Forward apex domain in GoDaddy ---"
          echo "  In GoDaddy: Forwarding -> Forward Domain"
          echo "  Forward: arunachalasamudra.co.in"
          echo "  To:      https://www.arunachalasamudra.co.in"
          echo "  Type:    Permanent (301)"
          echo ""
          echo "================================================"
