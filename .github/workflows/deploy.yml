name: Build and Deploy to AWS App Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: arunachalasamudra
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:491766120292:service/contemplation-flow/5b294ce6aeb54f53826ce2d6e8e33a17

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Building Docker image..."
          docker build \
            --build-arg VITE_API_BASE_URL=https://arunachalasamudra.co.in/api \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            .
          echo "Build complete."

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Pushing image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          echo "Push complete. Image: $ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Update App Runner service image and deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          echo "Updating App Runner service to use image: $IMAGE_URI"

          # Update the service to point to the exact new image SHA (avoids stale :latest issues)
          UPDATE_RESULT=$(aws apprunner update-service \
            --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
            --source-configuration "{\"ImageRepository\":{\"ImageIdentifier\":\"$IMAGE_URI\",\"ImageRepositoryType\":\"ECR\",\"ImageConfiguration\":{\"Port\":\"8000\"}}}" \
            --output json 2>&1) || true

          echo "Update result: $UPDATE_RESULT"

          # Give the update a moment to register, then trigger deployment
          sleep 5
          echo "Triggering deployment..."
          DEPLOY_RESULT=$(aws apprunner start-deployment \
            --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
            --output json)

          OPERATION_ID=$(echo "$DEPLOY_RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['OperationId'])")
          echo "Deployment triggered. Operation ID: $OPERATION_ID"
          echo "OPERATION_ID=$OPERATION_ID" >> $GITHUB_ENV

      - name: Wait for deployment operation to succeed
        run: |
          echo "Waiting for operation $OPERATION_ID to complete..."
          for i in {1..40}; do
            OP_STATUS=$(aws apprunner list-operations \
              --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
              --query "OperationSummaryList[?Id=='$OPERATION_ID'].Status" \
              --output text 2>/dev/null || echo "UNKNOWN")

            SVC_STATUS=$(aws apprunner describe-service \
              --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
              --query 'Service.Status' --output text)

            echo "Operation: $OP_STATUS | Service: $SVC_STATUS (check $i/40)"

            if [ "$OP_STATUS" = "SUCCEEDED" ]; then
              echo "✅ Deployment succeeded! Service is live with new image."
              exit 0
            elif [ "$OP_STATUS" = "FAILED" ] || [ "$SVC_STATUS" = "UPDATE_FAILED" ]; then
              echo "❌ Deployment FAILED. Check App Runner console for logs."
              exit 1
            fi
            sleep 20
          done
          echo "⚠️ Timed out after 13 minutes. Check App Runner console."
          exit 1
