name: Build and Deploy to AWS App Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: arunachalasamudra
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:491766120292:service/contemplation-flow/5b294ce6aeb54f53826ce2d6e8e33a17

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Building Docker image..."
          docker build \
            --build-arg VITE_API_BASE_URL=/api \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          echo "Build complete."

      - name: Push image to ECR and capture digest
        id: push-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Pushing image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $ECR_REGISTRY/$ECR_REPOSITORY:latest)
          echo "Pushed image digest: $IMAGE_DIGEST"
          echo "IMAGE_URI=$IMAGE_DIGEST" >> $GITHUB_ENV
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

      - name: Wait for App Runner to be RUNNING before updating
        run: |
          echo "Waiting for service to be RUNNING (may be busy from previous deploy)..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APP_RUNNER_SERVICE_ARN" \
              --query 'Service.Status' --output text)
            echo "Status: $STATUS (check $i/30)"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Service is RUNNING — ready."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: service not RUNNING after 10 minutes"
              exit 1
            fi
            sleep 20
          done

      - name: Update App Runner service with new image
        run: |
          echo "Reading existing service config..."
          SVC_JSON=$(aws apprunner describe-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --output json)

          ACCESS_ROLE_ARN=$(echo "$SVC_JSON" | jq -r '.Service.SourceConfiguration.AuthenticationConfiguration.AccessRoleArn // empty')
          echo "Access role ARN: $ACCESS_ROLE_ARN"
          echo "New image URI:   $IMAGE_URI"

          CONFIG_JSON=$(jq -n \
            --arg img "$IMAGE_URI" \
            --arg role "$ACCESS_ROLE_ARN" \
            '{
              ImageRepository: {
                ImageIdentifier: $img,
                ImageRepositoryType: "ECR",
                ImageConfiguration: { Port: "8000" }
              },
              AutoDeploymentsEnabled: false,
              AuthenticationConfiguration: { AccessRoleArn: $role }
            }')

          echo "Source config:"
          echo "$CONFIG_JSON"

          echo "Calling update-service..."
          aws apprunner update-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --source-configuration "$CONFIG_JSON" \
            --output json | jq -r '.Service.Status'

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for service to reach RUNNING after update..."
          for i in $(seq 1 45); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APP_RUNNER_SERVICE_ARN" \
              --query 'Service.Status' --output text)
            echo "Status: $STATUS (check $i/45, ~$((i * 20 / 60))m elapsed)"

            if [ "$STATUS" = "RUNNING" ]; then
              echo "Deployment succeeded!"
              exit 0
            fi
            if [ "$STATUS" = "UPDATE_FAILED" ]; then
              echo "ERROR: App Runner reported UPDATE_FAILED. Check App Runner logs."
              exit 1
            fi
            sleep 20
          done
          echo "ERROR: Timed out after 15 minutes."
          exit 1

      - name: Verify deployment
        if: always()
        run: |
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --query 'Service.ServiceUrl' --output text)
          STATUS=$(aws apprunner describe-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --query 'Service.Status' --output text)
          echo "App Runner URL: https://$SERVICE_URL"
          echo "Final status: $STATUS"
          echo "Health: $(curl -sf https://$SERVICE_URL/health || echo 'health check failed')"
