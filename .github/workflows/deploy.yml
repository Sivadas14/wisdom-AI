name: Build and Deploy to AWS App Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:
 
concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: arunachalasamudra
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:491766120292:service/contemplation-flow/5b294ce6aeb54f53826ce2d6e8e33a17

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest
    # Abort if any command fails (including inside pipes)
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image (tagged with git SHA)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          GIT_SHA: ${{ github.sha }}
        run: |
          echo "Building image for commit: $GIT_SHA"
          IMAGE_TAG="${ECR_REGISTRY}/${ECR_REPOSITORY}:${GIT_SHA}"
          IMAGE_LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          docker build \
            --build-arg VITE_API_BASE_URL=/api \
            --build-arg VITE_SUPABASE_URL=https://jmmqzddkwsmwdczwtrwq.supabase.co \
            --build-arg VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptbXF6ZGRrd3Ntd2Rjend0cndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NDQ3NTAsImV4cCI6MjA4NTMyMDc1MH0.NRqYCh6j1VmIPckh3S2Tcs5f9xNo9n5Nr1khohlVTU8 \
            --build-arg GIT_SHA="${GIT_SHA}" \
            -t "$IMAGE_TAG" \
            -t "$IMAGE_LATEST" \
            .

          echo "Pushing images..."
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

          # Use the SHA-tagged image URI so App Runner always gets a unique identifier
          echo "IMAGE_URI=$IMAGE_TAG" >> $GITHUB_ENV
          echo "Pushed: $IMAGE_TAG"

      - name: Wait for App Runner to be RUNNING before updating
        run: |
          echo "Waiting for service to be RUNNING..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APP_RUNNER_SERVICE_ARN" \
              --query 'Service.Status' --output text)
            echo "  Status: $STATUS (check $i/30)"
            if [ "$STATUS" = "RUNNING" ] || [ "$STATUS" = "UPDATE_FAILED" ]; then
              echo "  Service is $STATUS — proceeding with update."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "  ERROR: service not RUNNING after 10 minutes"
              exit 1
            fi
            sleep 20
          done

      - name: Update App Runner service with new image
        run: |
          echo "Image to deploy: $IMAGE_URI"

          # Only pass the image — do NOT include AuthenticationConfiguration.
          # App Runner preserves the existing ECR access role from service creation.
          # Passing AuthenticationConfiguration requires iam:PassRole which claude-deploy lacks.
          CONFIG_JSON=$(jq -n \
            --arg img "$IMAGE_URI" \
            '{
              ImageRepository: {
                ImageIdentifier: $img,
                ImageRepositoryType: "ECR",
                ImageConfiguration: { Port: "8000" }
              },
              AutoDeploymentsEnabled: false
            }')

          echo "Source config: $CONFIG_JSON"

          echo "Calling update-service..."
          RESULT=$(aws apprunner update-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --source-configuration "$CONFIG_JSON" \
            --output json)

          echo "update-service response:"
          echo "$RESULT" | jq -r '.Service | "  Status: \(.Status)"'

      - name: Wait for deployment to complete
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          echo "Waiting for service to reach RUNNING (up to 15 min)..."
          echo "This workflow built: $GIT_SHA"
          # Give App Runner time to begin the transition before polling
          sleep 30
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --query 'Service.ServiceUrl' --output text)
          for i in $(seq 1 45); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APP_RUNNER_SERVICE_ARN" \
              --query 'Service.Status' --output text)
            echo "  Status: $STATUS (check $i/45, ~$((i * 20 / 60))m elapsed)"

            if [ "$STATUS" = "UPDATE_FAILED" ]; then
              echo "ERROR: App Runner reported UPDATE_FAILED."
              echo "Check App Runner logs in the AWS console."
              exit 1
            fi

            if [ "$STATUS" = "RUNNING" ]; then
              DEPLOYED_SHA=$(curl -sf "https://$SERVICE_URL/health" \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || echo "")
              echo "  Deployed version: $DEPLOYED_SHA"

              if [ "$DEPLOYED_SHA" = "$GIT_SHA" ]; then
                # Exact match — this commit is live
                echo "✓ Deployment verified! This commit ($GIT_SHA) is live."
                exit 0
              elif [ -n "$DEPLOYED_SHA" ]; then
                # A DIFFERENT SHA is live — App Runner silently reverted to old code.
                # This means the new container failed its health check.
                # Check App Runner logs in the AWS console for startup errors.
                echo "✗ App Runner reverted! Expected $GIT_SHA but got $DEPLOYED_SHA."
                echo "  The new container failed its health check — check App Runner logs."
                exit 1
              else
                # Empty SHA — health endpoint unreachable, keep waiting
                echo "  RUNNING but health check returned no version — waiting..."
              fi
            fi
            sleep 20
          done

          # Timed out — do a final status check before failing.
          FINAL_STATUS=$(aws apprunner describe-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --query 'Service.Status' --output text)
          if [ "$FINAL_STATUS" = "RUNNING" ]; then
            echo "⚠ Timed out but service is RUNNING — treating as success."
            echo "  Check the health endpoint manually: https://$SERVICE_URL/health"
            exit 0
          else
            echo "ERROR: Timed out after 15 minutes and service status is $FINAL_STATUS."
            exit 1
          fi

      - name: Verify deployment
        if: always()
        run: |
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --query 'Service.ServiceUrl' --output text)
          STATUS=$(aws apprunner describe-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --query 'Service.Status' --output text)
          echo "App Runner URL: https://$SERVICE_URL"
          echo "Final status:   $STATUS"
          echo "Health check:   $(curl -sf "https://$SERVICE_URL/health" || echo 'FAILED')"
          echo "DB health:      $(curl -sf "https://$SERVICE_URL/api/health/db" || echo 'FAILED')"
