name: Build and Deploy to AWS App Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: arunachalasamudra
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:us-east-1:491766120292:service/contemplation-flow/5b294ce6aeb54f53826ce2d6e8e33a17

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Building Docker image..."
          docker build \
            --build-arg VITE_API_BASE_URL=/api \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          echo "Build complete."

      - name: Push image to ECR and capture digest
        id: push-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Pushing image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Capture the exact image digest so App Runner uses the NEW image
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $ECR_REGISTRY/$ECR_REPOSITORY:latest)
          echo "Pushed image digest: $IMAGE_DIGEST"
          echo "image_uri=$IMAGE_DIGEST" >> $GITHUB_OUTPUT
          echo "IMAGE_URI=$IMAGE_DIGEST" >> $GITHUB_ENV
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

      - name: Update App Runner service with new image
        run: |
          echo "Updating App Runner service to use new image: $IMAGE_URI"
          aws apprunner update-service \
            --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
            --source-configuration "{
              \"ImageRepository\": {
                \"ImageIdentifier\": \"$IMAGE_URI\",
                \"ImageRepositoryType\": \"ECR\",
                \"ImageConfiguration\": {
                  \"Port\": \"8000\"
                }
              },
              \"AutoDeploymentsEnabled\": false
            }" \
            --output json | python3 -c "import sys,json; d=json.load(sys.stdin); print('Service status:', d['Service']['Status'])"
          echo "Service updated. Waiting for update to be applied..."
          sleep 10

      - name: Trigger App Runner deployment
        run: |
          echo "Triggering App Runner deployment..."
          DEPLOY_RESULT=$(aws apprunner start-deployment \
            --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
            --output json)

          OPERATION_ID=$(echo "$DEPLOY_RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['OperationId'])")
          echo "Deployment triggered. Operation ID: $OPERATION_ID"
          echo "OPERATION_ID=$OPERATION_ID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for operation $OPERATION_ID to complete..."
          for i in {1..40}; do
            SVC_JSON=$(aws apprunner describe-service \
              --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
              --output json)

            SVC_STATUS=$(echo "$SVC_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['Service']['Status'])")
            echo "Service status: $SVC_STATUS (check $i/40)"

            if [ "$SVC_STATUS" = "RUNNING" ]; then
              echo "✅ Deployment succeeded! Service is live."
              exit 0
            elif [ "$SVC_STATUS" = "UPDATE_FAILED" ] || [ "$SVC_STATUS" = "OPERATION_IN_PROGRESS" ] && [ "$i" -eq 40 ]; then
              echo "❌ Deployment FAILED. Check App Runner console for logs."
              exit 1
            fi
            sleep 20
          done
          echo "⚠️ Timed out after 13 minutes. Check App Runner console."
          exit 1

      - name: Verify new image is live
        if: always()
        run: |
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
            --query 'Service.ServiceUrl' --output text)
          echo "🌐 App Runner URL: https://$SERVICE_URL"
          echo "🔗 Health: $(curl -s https://$SERVICE_URL/health)"
