name: Daily Health Monitor

on:
  # Run every day at 8:00 AM IST (02:30 UTC)
  schedule:
    - cron: "30 2 * * *"

  # Also allow manual run from GitHub Actions tab at any time
  workflow_dispatch:

jobs:
  monitor:
    name: Check All Systems
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run health monitor
        id: monitor
        continue-on-error: true
        run: |
          python scripts/monitor.py 2>&1 | tee /tmp/monitor_output.txt
          echo "MONITOR_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Send email report
        env:
          GMAIL_USER: dassiv67@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT: rsivadas@gmail.com
          MONITOR_OUTPUT: /tmp/monitor_output.txt
        run: python scripts/send_report.py

      - name: Fail job if monitor found issues
        run: |
          if [ "${MONITOR_EXIT}" = "1" ]; then
            echo "::error::One or more health checks failed. Email sent to rsivadas@gmail.com."
            exit 1
          fi
